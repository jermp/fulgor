name: Production Release

on:
  push:
    tags:
      - 'v*'

jobs:
  validate-and-release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # This pulls the artifact saved by the 'Build' workflow
      - name: Download Binary
        uses: actions/download-artifact@v4
        with:
          name: compiled-fulgor-binary
          path: ./ # Places it in the root

      - name: Verify and Archive
        run: |
          chmod +x ./fulgor
          
          # 1. Version Check
          BINARY_VERSION=$(./fulgor help | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+')
          GIT_TAG=${{ github.ref_name }}
          if [ "$BINARY_VERSION" != "$GIT_TAG" ]; then
            echo "::error::Mismatch! Binary is $BINARY_VERSION, Tag is $GIT_TAG"
            exit 1
          fi
          
          # 2. Run release custom script
          bash scripts/create_release.sh --format zip {{ github.ref_name }}.tar.gz

      - name: Create GitHub Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          prerelease: true
          generate_release_notes: true
          files: |
            ${{ github.ref_name }}.tar.gz